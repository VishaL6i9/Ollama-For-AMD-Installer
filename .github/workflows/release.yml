name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install PyInstaller specifically for the build process
        pip install pyinstaller==6.10.0

    - name: Build Executable with PyInstaller
      run: |
        # --onefile: Bundles everything into a single .exe
        # --windowed: Hides the console window (GUI mode only)
        # --uac-admin: Embeds a manifest to automatically request Administrator privileges
        pyinstaller --noconfirm --onefile --windowed --uac-admin --name "Ollama-For-AMD-Installer" ollama_installer.py

    - name: Upload Artifact (For Manual Testing)
      if: github.event_name == 'workflow_dispatch'
      uses: actions/upload-artifact@v4
      with:
        name: Ollama-For-AMD-Installer
        path: dist/Ollama-For-AMD-Installer.exe
        retention-days: 7

    - name: Publish to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Ollama-For-AMD-Installer.exe
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}